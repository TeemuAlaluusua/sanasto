definitions:
- lang: fi
  text: kansainvälinen välittäjäverkosto, jossa sovelletaan OpenPEPPOL-yhdistyksen määrittelemiä sääntöjä verkoston toiminnalle

- lang: sv
  text: internationellt förmedlingsnätverk där regler fastställda av OpenPEPPOL-föreningen tillämpas

- lang: en
  text: international network in which rules defined by the OpenPEPPOL association are applied

notes:
- lang: fi
  text: |
    OpenPEPPOL-yhdistys määrittelee verkostossa käytettävät vakioidut
    liiketoimintaprosessit, liiketoimintasäännöt ja tietomallit.

- lang: sv
  text: |
    OpenPEPPOL-föreningen fastställer standardiserade affärsprocesser,
    affärsregler och datamodeller som används i nätverket.

- lang: en
  text: |
    The OpenPEPPOL association defines standardised business processes,
    business rules and data models used within the network.

