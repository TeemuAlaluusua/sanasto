definitions:
- lang: fi
  text: lausekieli, jolla osoitetaan ja käsitellään XML- ja JSON-rakenteiden solmuja

- lang: sv
  text: uttrycksspråk för att adressera och bearbeta noder i XML- och JSON-strukturer

- lang: en
  text: expression language for addressing and processing nodes in XML and JSON data structures

notes:
- lang: fi
  text: |
    XPath käyttää polkulausekkeita (path expressions), joilla voidaan navigoida
    XML-dokumentin hierarkkisessa rakenteessa.

- lang: fi
  text: |
    XPath toimii tyypillisesti osana muita kieliä, kuten XSLT ja XQuery,
    eikä sitä yleensä käytetä itsenäisenä ohjelmointikielenä.

- lang: fi
  text: |
    XPath 3.1 tukee XML:n lisäksi myös JSON-rakenteita sekä tietomallia,
    joka sisältää solmuja, atomisia arvoja, funktioita ja sekvenssejä.

- lang: sv
  text: |
    XPath använder sökuttryck (path expressions) för att navigera i hierarkiska
    XML-strukturer.

- lang: en
  text: |
    XPath uses path expressions to navigate hierarchical structures of XML documents.

