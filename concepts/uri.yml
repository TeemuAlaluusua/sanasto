definitions:
- lang: fi
  text: merkkijonosta muodostuva tunnus, joka yksikäsitteisesti yksilöi tietyn verkkoresurssin noudattaen sovittua syntaksia

- lang: sv
  text: en teckensträng som entydigt identifierar en specifik nätverksresurs enligt en överenskommen syntax

- lang: en
  text: a global identifier in the context of the World Wide Web

notes:
- lang: fi
  text: URI-tunnistetta käytetään tyypillisesti World Wide Webin verkkoresurssien yksilöimisessä.

- lang: fi
  text: |
    URI on verkossa olevan sisällön yksilöllinen tunniste. URI:lle on määritetty muoto,
    joka toimii samalla tavalla kuin URL. URI-muodossa määritellään sisällön muoto
    (esim. ”http:” verkkosivulle tai ”mailto:” sähköpostille) ja sisällön sijainti
    (esim. ”ym.fi” verkkosivulle tai sähköpostiosoite). URI-muodon tarkoituksena on
    ilmaista mistä ja missä muodossa haettu tieto löytyy. Tietomallin sisällöissä
    URI-muoto viittaa usein liitetiedostojen sijaintiin palvelimella.

- lang: sv
  text: URI används vanligtvis för att identifiera resurser på World Wide Web.

- lang: sv
  text: |
    URI är en unik identifierare för innehåll på nätet. URI har ett definierat format
    som liknar URL. I URI-formatet anges innehållets typ (t.ex. ”http:” för webbsidor
    eller ”mailto:” för e-post) och dess plats. Syftet med URI är att ange var och i
    vilken form information finns. I informationsmodeller används URI ofta för att
    referera till bilagors placering på en server.

- lang: en
  text: URI is typically used to identify resources on the World Wide Web.

- lang: en
  text: |
    A URI is a unique identifier for content on the web. It follows a defined format
    similar to a URL. A URI specifies both the type of the resource (e.g. “http:” or
    “mailto:”) and its location. The purpose of a URI is to indicate where and in
    what form information can be found. In data models, URIs often refer to the
    location of attachments on a server.

