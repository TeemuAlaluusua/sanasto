definitions:

- lang: fi
  text: |
    Sovittu informaation lähde minkä tahansa projektin tai omaisuuskohteen
    jokaisen informaatiokoosteen keräämiseksi, hallitsemiseksi ja
    levittämiseksi hallinnoidun prosessin kautta.

- lang: sv
  text: |
    En överenskommen informationskälla för att samla in, hantera och
    distribuera varje informationsmängd i ett projekt eller en tillgång
    genom en kontrollerad process.

- lang: en
  text: |
    Agreed source of information for collecting, managing and
    disseminating each information container through a managed process
    for a given project or asset.


notes:

- lang: fi
  text: |
    Yhteisen tietoympäristön työnkulku kuvaa käytettävät prosessit ja
    yhteisen tietoympäristön (CDE) sovellus voi tarjota näitä prosesseja
    tukevaa teknologiaa.

- lang: sv
  text: |
    Arbetsflödet i den gemensamma datamiljön beskriver de processer
    som används och CDE-applikationen kan erbjuda teknik som stöder
    dessa processer.

- lang: en
  text: |
    The workflow of the common data environment describes the processes
    used and the CDE application can provide technology supporting
    those processes.


