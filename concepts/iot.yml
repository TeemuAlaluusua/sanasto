definitions:
- lang: fi
  text: |
    Infrastruktuuri, joka koostuu toisiinsa yhdistetyistä
    entiteeteistä, kuten kohdeyksiköistä, ihmisistä,
    järjestelmistä ja informaatioresursseista, sekä
    palveluista, jotka käsittelevät fyysisestä ja
    virtuaalimaailmasta tulevaa informaatiota ja
    reagoivat siihen.

- lang: sv
  text: |
    Infrastruktur som består av sammankopplade entiteter,
    såsom enheter, människor, system och
    informationsresurser, samt tjänster som behandlar
    information från den fysiska och virtuella världen
    och reagerar på den.

- lang: en
  text: |
    Infrastructure consisting of interconnected entities
    such as devices, people, systems and information
    resources, together with services that process and
    respond to information originating from the physical
    and virtual world.

notes:
- lang: fi
  text: |
    IoT viittaa usein laitteiden ja koneiden
    yhdistämiseen internetiin sekä niiden tuottaman
    datan hyödyntämiseen yhdessä muiden tietolähteiden
    kanssa.

- lang: sv
  text: |
    IoT avser ofta sammankoppling av maskiner och
    enheter till internet samt användning av data
    som genereras av dessa tillsammans med andra
    datakällor.

- lang: en
  text: |
    IoT commonly refers to connecting devices and
    machines to the internet and integrating the
    data they generate with other data sources.

