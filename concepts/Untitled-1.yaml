definitions:
- lang: fi
  text: |
    Luettelo kaikista osista, tarroista, pakkauksista ja
    kokoonpanoista, joita tarvitaan valmiin tuotteen
    valmistamiseen ja toimittamiseen asiakkaalle.

- lang: sv
  text: |
    Lista över alla delar, etiketter, förpackningar och
    sammansättningar som krävs för att tillverka och leverera
    en färdig produkt till kunden.

- lang: en
  text: |
    List of all the parts, labels, packaging, and assemblies
    required to build and ship a finished product to
    customers.

notes:
- lang: en
  text: |
    mBOM differs from an engineering bill of material (eBOM)
    which represents the as-designed BOM.

