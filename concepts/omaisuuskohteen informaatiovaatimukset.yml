definitions:
- lang: fi
  text: Omaisuuskohteen informaatiovaatimukset kuvaavat informaatiovaatimukset suhteessa omaisuuskohteen käyttöön. Omaisuuskohteen informaatiovaatimuksissa (AIR) esitetään omaisuuskohteen informaation tuottamiseen tarvittavat liikkeenjohdolliset, kaupalliset ja tekniset näkökohdat.

- lang: sv
  text: Informationskrav för en tillgång beskriver informationskraven i förhållande till användningen av tillgången. I tillgångens informationskrav (AIR) anges de ledningsmässiga, kommersiella och tekniska aspekter som behövs för att producera information om tillgången.

- lang: en
  text: Asset information requirements describe the information requirements in relation to the use of an asset. The asset information requirements (AIR) present the managerial, commercial and technical aspects required to produce information about the asset.

