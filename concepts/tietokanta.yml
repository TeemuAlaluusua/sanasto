    label: database
    type: Suositettava termi

definitions:
  - lang: fi
    text: kokoelma koneluettavaa tietoa, joka on järjestetty niin, että siihen on helppo pääsy ja sitä on helppo hallita ja päivittää

  - lang: sv
    text: samling maskinläsbar information organiserad så att den lätt kan nås, hanteras och uppdateras

  - lang: en
    text: collection of machine-readable information organized so that it can be easily accessed, managed and updated

notes:
  - lang: fi
    text: |
      Tietokanta on yleensä hallittu tietovaranto,
      jota ylläpidetään tietokannanhallintajärjestelmän
      (DBMS) avulla.

  - lang: sv
    text: |
      En databas är vanligtvis ett informationslager
      som hanteras med hjälp av ett databashanteringssystem
      (DBMS).

  - lang: en
    text: |
      A database is typically maintained using a
      database management system (DBMS).

