definitions:
- lang: fi
  text: |
    data, joka on tarjolla muille ja jota kuka tahansa saa vapaasti
    käyttää, kierrättää, julkaista uudelleen ja levittää edelleen.

- lang: sv
  text: |
    data som är tillgängliga för andra och som vem som helst fritt
    får använda, återanvända, publicera på nytt och vidareförmedla.

- lang: en
  text: |
    data that are available to others and that anyone may freely
    use, reuse, republish and redistribute.

