definitions:
  - lang: fi
    text: MRP-ohjelmistosovellus, joka ohjaa ja aikatauluttaa materiaalivirtoja tuotannon vaatimusten mukaisesti.
  - lang: sv
    text: MRP-programvaruapplikation som styr och schemalägger materialflöden enligt produktionskrav.
  - lang: en
    text: Software application (MRP) that controls and schedules material flows according to production requirements.
notes:
  - lang: fi
    text: |
      Materiaalitarvelaskenta (MRP) ohjaa materiaalien hankintaa ja tuotannon ajoitusta tuotantosuunnitelmien perusteella.
  - lang: sv
    text: |
      Materialbehovsplanering (MRP) styr materialanskaffning och produktionsplanering baserat på produktionsplaner.
  - lang: en
    text: |
      Manufacturing Resource Planning (MRP) supports material procurement and production scheduling based on production plans.
