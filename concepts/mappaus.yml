  - lang: sv
    label: mappning
    type: Suositettava termi
  - lang: sv
    label: semantisk mappning
    type: Synonyymi

  - lang: en
    label: mapping
    type: Suositettava termi

definitions:
  - lang: fi
    text: |
      Yhteen joukkoon kuuluvan elementin rinnastaminen
      toisen joukon elementtiin semanttisen vastaavuuden
      perusteella.
  - lang: sv
    text: |
      Koppling av ett element i en mängd till ett element
      i en annan mängd baserat på semantisk motsvarighet.
  - lang: en
    text: |
      Assigning an element in one set to an element in
      another set through semantic correspondence.

notes:
  - lang: fi
    text: |
      Vastaavuusmäärittelyssä selvitetään kahden eri
      joukon elementtien väliset semanttiset vastaavuudet.
  - lang: sv
    text: |
      Vid mappning fastställs de semantiska
      motsvarigheterna mellan element i två olika mängder.
  - lang: en
    text: |
      Mapping establishes the semantic correspondence
      between elements of two different sets.

sources:
