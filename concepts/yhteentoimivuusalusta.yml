  label: interoperability platform
  type: Suositettava termi

definitions:
- lang: fi
  text: sanastoista, koodistoista ja tietomalleista sekä niiden käyttöön ja muokkaukseen tarkoitetuista työkaluista muodostuva kokonaisuus, jonka tarkoituksena on edistää yhteentoimivuutta

- lang: sv
  text: helhet bestående av terminologier, kodsystem och informationsmodeller samt verktyg för deras användning och redigering, vars syfte är att främja interoperabilitet

- lang: en
  text: a set consisting of vocabularies, code lists and data models as well as tools for their use and maintenance, intended to promote interoperability

notes:
- lang: fi
  text: |
    Suomen Digi- ja väestötietoviraston (DVV) ylläpitämä yhteentoimivuusalusta on kokoelma
    työkaluja, joiden käyttö on vapaata ja avointa. Työkaluilla voidaan laatia sanastoja,
    koodistoja ja loogisia tietomalleja, joita voidaan jakaa eri toimijoiden kesken.
    Palvelu on tarkoitettu niin julkisille kuin yksityisille toimijoille. Palvelun
    tarkoitus on vähentää päällekkäistä työtä, kun jo kertaalleen määriteltyjä
    kokonaisuuksia voi hyödyntää uusien projektikokonaisuuksien pohjalla.

- lang: sv
  text: |
    Interoperabilitetsplattformen som upprätthålls av Myndigheten för digitalisering och befolkningsdata i Finland (DVV) är en samling verktyg som är fritt och öppet tillgängliga.
    Med verktygen kan man skapa terminologier, kodsystem och logiska datamodeller
    som kan delas mellan olika aktörer. Tjänsten är avsedd för både offentliga och
    privata aktörer. Syftet med tjänsten är att minska överlappande arbete genom att
    redan definierade helheter kan återanvändas som grund för nya projekt.

- lang: en
  text: |
    The interoperability platform maintained by the Digital and Population Data Services Agency of Finland (DVV) is a collection of tools that are freely and openly available.
    The tools can be used to create vocabularies, code lists and logical data models
    that can be shared between different stakeholders. The service is intended for
    both public and private actors. Its purpose is to reduce overlapping work by
    enabling previously defined entities to be reused as a basis for new projects.

