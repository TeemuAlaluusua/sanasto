definitions:
- lang: fi
  text: |
    Luettelo osanumeroista ja kokoonpanoista, jotka muodostavat
    suunnittelun mukaisen tuotteen kokoonpanorakenteen ja
    sisältävät esimerkiksi raaka-aineen mitat ja
    materiaalimääritykset.

- lang: sv
  text: |
    Lista över artikelnummer och sammansättningar som utgör
    den konstruktionsmässiga produktkonfigurationen och som
    innehåller uppgifter om råmaterialets dimensioner och
    materialspecifikationer.

- lang: en
  text: |
    List of part numbers and assemblies that make up the
    design engineering configuration that contains the raw
    stock size and the material specification.

