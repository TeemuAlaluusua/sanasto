definitions:
- lang: fi
  text: Valintalista on digitaalisen graafisen käyttöliittymän elementti, joka tarjoaa käyttäjälle mahdollisuuden valita vaihtoehtoja, kuten termejä valmiilta listalta.

- lang: sv
  text: En vallista är ett element i ett digitalt grafiskt användargränssnitt som ger användaren möjlighet att välja alternativ, såsom termer, från en fördefinierad lista.

- lang: en
  text: A pick list is an element of a digital graphical user interface that allows the user to select options, such as terms, from a predefined list.

