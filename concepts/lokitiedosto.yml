id: käsiteskeema
status: []
schemeId: []

terms:
  - lang: fi
    label: käsiteskeema
    type: Suositettava termi

  - lang: sv
    label: begreppsschema
    type: Suositettava termi

  - lang: en
    label: conceptual schema
    type: Suositettava termi

definitions:
  - lang: fi
    text: |
      Käsitemallin muodollinen kuvaus, joka esittää
      kohdealueen käsitteet sekä niiden väliset
      suhteet rakenteisessa muodossa.

  - lang: sv
    text: |
      Formell beskrivning av en begreppsmodell som
      anger begreppen i ett visst område samt deras
      inbördes relationer i strukturerad form.

  - lang: en
    text: |
      Formal description of a conceptual model that
      specifies the concepts of a domain and the
      relationships between them.

notes:
  - lang: fi
    text: |
      Käsiteskeema esittää käsitemallin muodollisessa
      muodossa ja toimii usein lähtökohtana
      tietomallien ja tietojärjestelmien suunnittelulle.

  - lang: sv
    text: |
      Ett begreppsschema uttrycker en begreppsmodell
      i formell form och används ofta som grund för
      informationsmodeller och informationssystem.

  - lang: en
    text: |
      A conceptual schema expresses a conceptual
      model in a formalized structure and may serve
      as a basis for information models and
      information systems.

sources:
  - lang: en
    label: ISO 5127:2022
    uri: https://www.iso.org

