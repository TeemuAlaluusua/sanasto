terms:
  - lang: fi
    label: tietue
    type: Suositettava termi

  - lang: sv
    label: post
    type: Suositettava termi

  - lang: en
    label: record
    type: Suositettava termi

definitions:
  - lang: fi
    text: dokumentin osa tai dokumentti, joka sisältää rakenteellisen ja sisäisesti järjestetyn joukon itsenäistä mutta toisiinsa liittyvää dataa, joka koskee yhtä henkilöä tai muuta oliota ja joka on valittu ja esitetty tiettyä tarkoitusta varten

  - lang: sv
    text: del av ett dokument eller dokument som innehåller en strukturerad och internt organiserad uppsättning självständiga men relaterade data om en person eller annat objekt, valda och presenterade för ett specifikt syfte

  - lang: en
    text: part of a document or document containing a structured and internally organized set of self-contained but related data on one person or other object, selected and presented for a predefined specific purpose

notes:
  - lang: fi
    text: |
      Tietue koostuu yleensä useista kentistä,
      jotka kuvaavat tietyn kohteen ominaisuuksia.

  - lang: sv
    text: |
      En post består vanligtvis av flera fält
      som beskriver egenskaper hos ett visst objekt.

  - lang: en
    text: |
      A record typically consists of several
      fields describing attributes of a given object.

sources:
