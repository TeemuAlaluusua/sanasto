notes:
  - lang: fi
    text: |
      Dataformaatti määrittelee, miten data esitetään ja
      jäsennetään tallennuksessa tai tiedonsiirrossa.
  - lang: sv
    text: |
      Dataformat anger hur data representeras och struktureras
      vid lagring eller överföring.
  - lang: en
    text: |
      A data format specifies how data is represented and
      structured for storage or transmission.

