  label: semanttinen yhteentoimivuus
  type: Suositettava termi

- lang: sv
  label: semantisk interoperabilitet
  type: Suositettava termi

- lang: en
  label: semantic interoperability
  type: Suositettava termi

definitions:
- lang: fi
  text: yhteentoimivuus, joka mahdollistaa tiedon siirtämisen ja käsittelyn tavalla, jossa tiedon merkitys säilyy muuttumattomana ja ymmärrettävänä kaikille osapuolille

- lang: sv
  text: interoperabilitet som gör det möjligt att överföra och behandla information så att dess innebörd bevaras oförändrad och begriplig för alla parter

- lang: en
  text: form of interoperability that enables the transfer and processing of data in a way that retains the meaning of the data so that it remains unchanged and understandable for all parties

