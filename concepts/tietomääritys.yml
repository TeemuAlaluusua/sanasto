definitions:
- lang: fi
  text: tiedon täsmällinen kuvaus koodistona, sanastona tai tietomallina

- lang: sv
  text: noggrann beskrivning av information som kodsystem, terminologi eller datamodell

- lang: en
  text: precise description of information as a code list, vocabulary or data model

notes:
- lang: fi
  text: Tietomääritys-käsitettä käytetään yläkäsitteenä erilaisista tietokuvauksista.

- lang: sv
  text: Begreppet informationsspecifikation används som ett överordnat begrepp för olika typer av informationsbeskrivningar.

- lang: en
  text: The concept of information specification is used as a general concept for different types of information descriptions.

