definitions:

- lang: fi
  text: |
    Yleinen tietomalli, jonka avulla jaetaan ja linkitetään
    tietämysalkioita internetissä.

- lang: sv
  text: |
    En gemensam datamodell för att dela och länka
    kunskapsobjekt på internet.

- lang: en
  text: |
    Common data model for sharing and linking
    knowledge items via the internet.


notes:

- lang: fi
  text: |
    SKOS on W3C:n suositus sanastojen, tesaurusten ja
    luokitusjärjestelmien esittämiseen RDF-muodossa.

- lang: sv
  text: |
    SKOS är en W3C-rekommendation för att representera
    tesaurer, klassifikationssystem och andra vokabulärer i RDF.

- lang: en
  text: |
    SKOS is a W3C recommendation used to represent
    thesauri, classification schemes and other vocabularies in RDF.


