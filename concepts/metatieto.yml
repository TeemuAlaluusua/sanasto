definitions:
- lang: fi
  text: tieto, joka kuvaa aineiston kontekstia, sisältöä tai rakennetta sekä ohjaa ja dokumentoi sen käsittelyä ja hallintaa

- lang: sv
  text: information som beskriver ett materials kontext, innehåll eller struktur samt styr och dokumenterar dess hantering och förvaltning

- lang: en
  text: information that describes the context, content or structure of a resource and guides and documents its processing and management

notes:
- lang: fi
  text: Metatieto on tietoa tiedosta.

- lang: sv
  text: Metadata är data om data.

- lang: en
  text: Metadata is data about data.

