definitions:
- lang: fi
  text: |
    Luettelo kaikista osista, tarroista, pakkauksista ja
    kokoonpanoista, joita tarvitaan valmiin tuotteen
    valmistamiseen ja toimittamiseen asiakkaalle.

- lang: sv
  text: |
    Lista över alla delar, etiketter, förpackningar och
    sammansättningar som krävs för att tillverka och leverera
    en färdig produkt till kunden.

- lang: en
  text: |
    List of all the parts, labels, packaging, and assemblies
    required to build and ship a finished product to
    customers.

notes:
- lang: fi
  text: |
    Valmistuksen tuoteosaluettelo kuvaa tuotteen
    valmistuksessa ja toimituksessa tarvittavat
    osat ja materiaalit (as-built). Se voi poiketa
    suunnittelun tuoteosaluettelosta esimerkiksi
    valmistusvaiheiden, pakkausten tai
    tuotantokohtaisten komponenttien vuoksi.

- lang: sv
  text: |
    Tillverkningsmateriallistan beskriver de delar
    och material som används vid tillverkning och
    leverans av produkten (as-built). Den kan skilja
    sig från konstruktionsmateriallistan på grund
    av produktionsprocesser, förpackningar eller
    produktionsspecifika komponenter.

- lang: en
  text: |
    A manufacturing bill of material describes the
    components and materials used in manufacturing
    and delivery of the finished product (as-built).
    It may differ from the engineering bill of
    material due to manufacturing processes,
    packaging or production-specific components.

