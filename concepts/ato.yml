definitions:
- lang: fi
  text: |
    Tuotanto- ja toimitusstrategia, jossa tuote kootaan asiakkaan
    tilauksen jälkeen varastoiduista vakiokomponenteista tai
    osakokoonpanoista. Komponentit valmistetaan tai hankitaan
    etukäteen, mutta lopullinen kokoonpano tehdään vasta
    asiakastilauksen perusteella. Toimitusaika määräytyy
    komponentti- ja osakokoonpanovaraston saatavuuden sekä
    kokoonpanoajan mukaan.

- lang: sv
  text: |
    Produktions- och leveransstrategi där produkten monteras efter
    kundorder från lagerhållna standardkomponenter eller
    delmontage. Komponenterna tillverkas eller anskaffas i förväg,
    men den slutliga monteringen sker först efter mottagen
    kundorder. Leveranstiden bestäms av tillgången på komponent-
    och delmontagelager samt monteringstiden.

- lang: en
  text: |
    Production and fulfilment strategy in which a product is
    assembled after receipt of a customer order from stocked
    standard components or subassemblies. Components are produced
    or procured in advance, while the final assembly is performed
    only after the order is received. Lead time depends on the
    availability of components and subassemblies and the assembly
    time.

